<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Noetikon Admin{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <style>
        nav ul li a.active { font-weight: bold; text-decoration: underline; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; }
        .badge-trusted { background: #d4edda; color: #155724; }
        .badge-untrusted { background: #f8d7da; color: #721c24; }
        .actions { display: flex; gap: 0.5rem; }
        .actions form { margin: 0; }
        .actions button { padding: 4px 12px; margin: 0; font-size: 0.85em; }
    </style>
</head>
<body>
    <nav class="container">
        <ul>
            <li><strong>Noetikon</strong></li>
        </ul>
        <ul>
            <li><a href="/users" {% if request.url.path.startswith('/users') %}class="active"{% endif %}>Users</a></li>
            <li><a href="/groups" {% if request.url.path.startswith('/groups') %}class="active"{% endif %}>Groups</a></li>
            <li><a href="/stats" {% if request.url.path.startswith('/stats') %}class="active"{% endif %}>Stats</a></li>
            <li><a href="/logout">Logout</a></li>
        </ul>
    </nav>
    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
