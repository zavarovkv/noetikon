services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: noetikon
      POSTGRES_USER: noetikon
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noetikon"]
      interval: 5s
      timeout: 3s
      retries: 5

  bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile.bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://noetikon:${POSTGRES_PASSWORD}@postgres:5432/noetikon
    ports:
      - "${WEBHOOK_PORT:-8443}:${WEBHOOK_PORT:-8443}"
    stop_grace_period: 30s

  admin:
    build:
      context: ..
      dockerfile: docker/Dockerfile.admin
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql+asyncpg://noetikon:${POSTGRES_PASSWORD}@postgres:5432/noetikon
    ports:
      - "${ADMIN_PORT:-8080}:${ADMIN_PORT:-8080}"

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PGHOST: postgres
      PGUSER: noetikon
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: noetikon
    volumes:
      - backups:/backups
    entrypoint: >
      sh -c "while true; do
        pg_dump > /backups/backup_$$(date +%Y%m%d_%H%M%S).sql;
        ls -t /backups/backup_*.sql | tail -n +8 | xargs rm -f;
        sleep 86400;
      done"

volumes:
  pgdata:
  backups:
